extracted:
  raw_text_by_page:
    home: >-
      Designing the future, one structure at a time. Structural engineering, real
      estate development and project management across Quebec. From site analysis
      to execution, we deliver optimized, value-engineered projects with precision.
      Our Service Comprehensive Engineering, Development and Project management,
      from planning to completion. Ready to create something extraordinary? Whether
      you're designing a dream home, a cutting-edge workplace, or a sustainable
      urban space, we're here to turn your ideas into reality. Contact us.
    about: >-
      Our Vision To be a leading partner in structural engineering and real estate
      development, supporting the creation of large-scale, high-impact projects
      across Quebec. Our Mission To deliver optimized, value-engineered solutions
      that enhance project viability, reduce costs, and support efficient execution,
      from early-stage planning to construction. Core Value We prioritize clarity,
      efficiency and results-driven thinking. Founded in 2022, Metanova
      Experts-Conseils brings together over 20 years of combined experience.
      Suddam Al-Salem, ing. Managing Partner Engineering Division. Muhannad
      Al-Salem Managing Partner Real Estate Development Division.
    services: >-
      Structural Engineering At Metanova, we provide expert structural engineering
      consulting tailored to ensure the safety, durability, and efficiency of your
      building projects. Project Management & Development Consulting We provide
      end-to-end project management and development consulting for residential and
      mixed-use projects across Quebec.
    contact: >-
      Get In Touch. Contact us. We'd love to hear from you! Our Location 7005
      Taschereau Blvd #305 Brossard, QC J4Z 1A7. Mail us info@metanova.ca. Call
      us +1 (514) 222-3444.
    residential: >-
      Residential portfolio. From luxury single-family homes to large-scale
      condominium developments.
    hospitality: >-
      Hospitality portfolio. Hotels, resorts, and leisure facilities that balance
      guest experience with structural performance.
    commercial: >-
      Commercial portfolio. Office buildings, retail spaces, and mixed-use
      developments engineered for performance.
  extraction_date: "2026-03-29"
  source_url: "https://titen-site.framer.website"

confirmed:
  company:
    name: Metanova
    legal_name: Metanova Experts-Conseils
    tagline: "Designing the future, one structure at a time"
    founded: 2022
    location: "Brossard, Quebec, Canada"
  people:
    - name: "Suddam Al-Salem, ing."
      role: "Managing Partner"
      title: "Engineering Division"
      bio: >-
        A licensed structural engineer with extensive experience in building
        design across steel, wood, and concrete structures. Previously at NCK,
        Suddam brings deep technical expertise and a commitment to engineering
        excellence to every project Metanova undertakes.
      portrait: "/metanova-assets/people/suddam-al-salem.jpg"
    - name: Muhannad Al-Salem
      role: "Managing Partner"
      title: "Real Estate Development Division"
      bio: >-
        With over a decade of experience in real estate development and a
        background in architecture and construction management, Muhannad has been
        a licensed general contractor since 2011. He leads Metanova's development
        division with a hands-on, results-driven approach.
      portrait: "/metanova-assets/people/muhannad-al-salem.jpg"
  services:
    - id: structural-engineering
      name: Structural Engineering
      summary: >-
        Expert structural engineering consulting tailored to ensure the safety,
        durability, and efficiency of building projects.
      key_points:
        - "Structural design (wood, steel, concrete)"
        - "Value engineering & cost optimization"
        - "Structural analysis and feasibility"
        - "Construction drawings and technical documentation"
      detailed_description: >-
        Complete structural design and analysis services for new construction,
        renovations, and assessments. Our team of licensed engineers works across
        steel, concrete, and wood structures to deliver safe, efficient, and
        code-compliant designs.
    - id: real-estate-development
      name: Real Estate Development
      summary: >-
        Strategic real estate development consulting — site analysis, feasibility
        studies, land optimization, and project positioning.
      key_points:
        - "Site analysis & development potential"
        - "Feasibility studies & project structuring"
        - "Land optimization & density strategies"
        - "Support in zoning changes & approvals"
        - "Coordination with municipalities & stakeholders"
        - "Concept development & project positioning"
      detailed_description: >-
        We support the strategic development of sites by unlocking their full
        potential and structuring viable, high-performing projects across Quebec.
    - id: project-management-consulting
      name: Project Management & Development Consulting
      summary: >-
        End-to-end project management and development consulting for residential
        and mixed-use projects across Quebec.
      key_points:
        - "Budgeting & financial forecasting"
        - "Scheduling & milestone control"
        - "Zoning amendments & municipal coordination"
        - "Infrastructure planning & contractor oversight"
        - "Risk management & regulatory strategy"
      detailed_description: >-
        From pre-construction planning through project closeout, we provide
        hands-on project management and development consulting that keeps your
        project on time, on budget, and on target.
  contact:
    address: "7005 Taschereau Blvd #305, Brossard, QC J4Z 1A7"
    email: info@metanova.ca
    phone: "+1 (514) 222-3444"
  project_types:
    - id: residential
      name: Residential
      summary: >-
        Custom homes, condos, multi-family developments combining structural
        excellence with livability.
    - id: hospitality
      name: Hospitality
      summary: >-
        Hotels, resorts, and leisure facilities balancing guest experience with
        structural performance.
    - id: commercial
      name: Commercial
      summary: >-
        Office buildings, retail spaces, and mixed-use developments engineered
        for performance and long-term value.
  nav_labels:
    - slug: about
      label: About
    - slug: services
      label: Services
    - slug: residential
      label: Residential
    - slug: hospitality
      label: Hospitality
    - slug: commercial
      label: Commercial
    - slug: contact
      label: Contact
  footer:
    tagline: "Designing the future, one structure at a time."
    legal_text: "Metanova Experts-Conseils. All rights reserved."

